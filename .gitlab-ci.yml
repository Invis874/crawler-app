image: python:3.11

stages:
  - test
  - build
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

before_script:
  - pip install -r requirements.txt

test:
  stage: test
  script:
    - pip install pytest pytest-asyncio
    - pytest tests/
  only:
    - merge_requests
    - main

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t $DOCKER_IMAGE .
    - docker push $DOCKER_IMAGE
  only:
    - main

deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl set image deployment/crawler-app app=$DOCKER_IMAGE
    - kubectl rollout status deployment/crawler-app
  only:
    - main
  when: manual